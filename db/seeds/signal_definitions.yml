# Signal Catalog — PRD §4.4 + §5.3. System catalog (NOT tenant-scoped).
# Seeded by `db/seeds.rb` via `Rails.application.load_seed`. Idempotent:
# re-running UPSERTs by `code`.
#
# Categories (PRD §4.4 CHECK constraint): financial, contractual,
# integration, transactional. Sum of default_weight across the catalog
# is 1.00 (± 0.01) so the default rule set works out of the box.
#
# Directions: `higher_is_worse` = bigger value → more risk points.
# `lower_is_worse` = smaller value → more risk points.

# ──────── FINANCIAL (0.35) — Invoice Reconciliation ────────
- code: invoice.late_ratio_30d
  category: financial
  source_system: invoice_recon
  direction: higher_is_worse
  value_type: rate
  default_weight: 0.10
  description: Share of invoices paid past due over the last 30 days.

- code: invoice.dispute_rate_90d
  category: financial
  source_system: invoice_recon
  direction: higher_is_worse
  value_type: rate
  default_weight: 0.06
  description: Share of invoices disputed over the last 90 days.

- code: invoice.discrepancy_rate_30d
  category: financial
  source_system: invoice_recon
  direction: higher_is_worse
  value_type: rate
  default_weight: 0.08
  description: Share of invoices flagged with line-item discrepancies (PO/GR mismatch) over 30 days.

- code: invoice.avg_days_to_pay
  category: financial
  source_system: invoice_recon
  direction: higher_is_worse
  value_type: duration_seconds
  default_weight: 0.05
  description: Rolling average days-to-pay (stored as seconds for value_type uniformity).

- code: invoice.overbilling_rate_30d
  category: financial
  source_system: invoice_recon
  direction: higher_is_worse
  value_type: rate
  default_weight: 0.06
  description: Share of invoices exceeding the PO unit price over the last 30 days.

# ──────── CONTRACTUAL (0.30) — Contract Lifecycle ────────
- code: contract.obligation_breach_count_90d
  category: contractual
  source_system: contract_engine
  direction: higher_is_worse
  value_type: count
  default_weight: 0.10
  description: Count of contract obligation breaches in the last 90 days.

- code: contract.sla_miss_ratio_30d
  category: contractual
  source_system: contract_engine
  direction: higher_is_worse
  value_type: rate
  default_weight: 0.07
  description: SLA miss ratio (obligations missed / obligations due) over the last 30 days.

- code: contract.renewal_at_risk
  category: contractual
  source_system: contract_engine
  direction: higher_is_worse
  value_type: boolean
  default_weight: 0.05
  description: The active contract is flagged as renewal-at-risk by Contract Lifecycle.

- code: contract.auto_renewal_flag
  category: contractual
  source_system: contract_engine
  direction: higher_is_worse
  value_type: boolean
  default_weight: 0.03
  description: Contract will auto-renew without procurement review — forces explicit re-tender decision.

- code: contract.obligation_deadline_missed_count_30d
  category: contractual
  source_system: contract_engine
  direction: higher_is_worse
  value_type: count
  default_weight: 0.05
  description: Count of obligation deadlines missed in the last 30 days (leading indicator).

