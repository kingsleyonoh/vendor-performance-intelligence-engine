# Default scoring rule per tenant — required for vendor_scores FK.
# Category weights sum to 1.00, band thresholds strictly ascending.

acme_default:
  tenant: acme_gmbh_de
  name: Default v1
  is_active: true
  category_weights: <%= {
    financial: 0.35,
    operational: 0.15,
    contractual: 0.30,
    integration: 0.15,
    transactional: 0.05
  }.to_json %>
  signal_weight_overrides: <%= {}.to_json %>
  band_thresholds: <%= { low_max: 25.0, medium_max: 50.0, high_max: 75.0 }.to_json %>
  window_days: 90
  time_decay_half_life_days: 45
  activated_at: 2026-04-01 00:00:00
  created_at: 2026-04-01 00:00:00
  updated_at: 2026-04-01 00:00:00

