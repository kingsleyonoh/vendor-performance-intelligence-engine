# Vendor signals — used by vendor detail UI (signal timeline) + top-contributor
# rendering. Append-only per PRD §2 invariant 3 — fixtures mirror that rule
# (status = normalized or scored, never mutated after load).
#
# NOTE: vendor_signals is partitioned by recorded_at. Partitions are created
# for current + adjacent months at test-DB prepare time (see the migration).
# Fixtures therefore pin `recorded_at` to relative ERB dates that always land
# in an existing partition. Schema has no `updated_at` column — signals are
# append-only.

# ---------- Acme Alpha — 3 signals ----------
acme_alpha_signal_1:
  tenant: acme_gmbh_de
  vendor: acme_alpha
  signal_code: invoice.late_ratio_30d
  source_system: invoice_recon
  source_event_id: acme-alpha-sig-1
  value_numeric: 0.05
  status: normalized
  context: <%= {}.to_json %>
  recorded_at: <%= 2.days.ago.iso8601 %>
  created_at: <%= 2.days.ago.iso8601 %>

