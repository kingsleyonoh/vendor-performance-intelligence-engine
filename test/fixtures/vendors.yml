# Tenant-scoped vendor directory. Each tenant gets ≥4 vendors spanning
# different bands + statuses so dashboard KPIs + vendors-list filters have
# meaningful data. Names are intentionally distinct per tenant to catch
# cross-tenant leakage (TENANT_IDENTITY_LEAK grep).

