# Two-tenant fixtures — PRD §4.T + Multi-Tenant Fixtures Mandatory
# (`.claude/rules/CODING_STANDARDS_TESTING.md`). Every §4.T identity
# column carries INTENTIONALLY DIFFERENT values across the two tenants
# so cross-tenant leakage in template rendering fails at RED phase, not
# in production. Non-ASCII ("Hauptstraße") on one side exercises UTF-8.

acme_gmbh_de:
  name: Acme GmbH (ops)
  slug: acme-gmbh-de
  api_key_hash: <%= Digest::SHA256.hexdigest("vpi_test_acme_key_00000000000000000000") %>
  api_key_prefix: vpi_test_acm
  is_active: true
  legal_name: Acme GmbH
  full_legal_name: Acme Procurement GmbH
  display_name: Acme
  address: <%= { line1: "Hauptstraße 10", city: "Berlin", postal_code: "10115", country_code: "DE" }.to_json %>
  registration: <%= { company_number: "HRB-123456", tax_id: "DE987654321", jurisdiction: "Berlin, DE" }.to_json %>
  contact: <%= { email: "procurement@acme-gmbh.example", phone: "+49 30 1234567" }.to_json %>
  settings: <%= {}.to_json %>
  brand_primary_hex: '#0B0F14'
  brand_accent_hex: '#E63946'
  locale: de-DE
  timezone: Europe/Berlin
  created_at: 2026-01-01 00:00:00
  updated_at: 2026-01-01 00:00:00

globex_inc_us:
  name: Globex Inc (ops)
  slug: globex-inc-us
  api_key_hash: <%= Digest::SHA256.hexdigest("vpi_test_globex_key_00000000000000000") %>
  api_key_prefix: vpi_test_glo
  is_active: true
  legal_name: Globex Inc.
  full_legal_name: Globex International, Inc.
  display_name: Globex
  address: <%= { line1: "1 Market Street", city: "San Francisco", region: "CA", postal_code: "94105", country_code: "US" }.to_json %>
  registration: <%= { company_number: "DE-12-3456789", tax_id: "US-EIN-12-3456789", jurisdiction: "Delaware, US" }.to_json %>
  contact: <%= { email: "procurement@globex-inc.example", phone: "+1 415 555 0100" }.to_json %>
  settings: <%= {}.to_json %>
  brand_primary_hex: '#1A202C'
  brand_accent_hex: '#2E7CFF'
  locale: en-US
  timezone: America/Los_Angeles
  created_at: 2026-01-01 00:00:00
  updated_at: 2026-01-01 00:00:00
