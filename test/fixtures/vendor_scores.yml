# Score snapshots used by dashboard KPI counts + vendors-list band filter.
# ≥1 score per active vendor; bands spread across low/medium/high/critical.
# Some older rows simulate a band-change history for the "5 largest band
# changes in last 7 days" dashboard widget.

<% category_scores = { financial: 30.0, operational: 30.0, contractual: 30.0, integration: 30.0, transactional: 30.0 }.to_json %>
<% alpha_contributors = [
     { "signal_code" => "invoice.late_ratio_30d", "contribution" => 12.5, "value" => 0.05 },
     { "signal_code" => "invoice.dispute_rate_90d", "contribution" => 8.3, "value" => 0.02 },
     { "signal_code" => "invoice.discrepancy_rate_30d", "contribution" => 6.1, "value" => 0.01 },
     { "signal_code" => "invoice.avg_days_to_pay", "contribution" => 4.2, "value" => 432000 },
     { "signal_code" => "invoice.overbilling_rate_30d", "contribution" => 2.0, "value" => 0.004 }
   ].to_json %>

# ---------- Acme — current scores ----------
acme_alpha_current:
  tenant: acme_gmbh_de
  vendor: acme_alpha
  scoring_rules_id: <%= ActiveRecord::FixtureSet.identify(:acme_default, :uuid) %>
  composite_score: 15.5
  band: low
  trend: stable
  category_scores: <%= category_scores %>
  top_contributors: <%= alpha_contributors %>
  window_days: 90
