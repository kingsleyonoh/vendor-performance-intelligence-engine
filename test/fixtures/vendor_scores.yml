# ---------- Phase 2 alert fixtures (Batch 015+) ----------
# Scores at the boundaries of HIGH/CRITICAL bands so the alert
# router can fire band-crossing events against them. Top contributors
# carry valid signal_codes so DeliveryPayload templates render
# without StrictVariableNotFound (PRD §15 #14).

<% critical_contributors = [
     { "signal_code" => "invoice.late_ratio_30d", "category" => "financial", "contribution" => 28.5, "value" => 0.42, "direction" => "higher_is_worse" },
     { "signal_code" => "invoice.dispute_rate_90d", "category" => "financial", "contribution" => 18.2, "value" => 0.18, "direction" => "higher_is_worse" },
     { "signal_code" => "contract.obligation_breach_count_90d", "category" => "contractual", "contribution" => 12.0, "value" => 4, "direction" => "higher_is_worse" },
     { "signal_code" => "webhook.delivery_failure_rate_30d", "category" => "integration", "contribution" => 8.5, "value" => 0.31, "direction" => "higher_is_worse" },
     { "signal_code" => "transaction.discrepancy_rate_30d", "category" => "transactional", "contribution" => 6.0, "value" => 0.07, "direction" => "higher_is_worse" }
   ].to_json %>

# Bound to acme_gamma (already watchlist + critical-banded) so the new
# fixture row stays consistent with existing dashboard / vendors-list
# expectations from Phase 1 batches. Same logic for globex_eta (high).
acme_critical_score:
  tenant: acme_gmbh_de
