name: Deploy to VPS

# SSH into vendors.kingsleyonoh.com, pull the freshly-built GHCR image,
# and `docker compose up -d` to roll the stack.
#
# Triggers on:
#   - completion of `Build & Push to GHCR` workflow on main
#   - manual `workflow_dispatch` (with optional image tag override)
#
# Required GitHub repository secrets:
#   VPS_HOST                 — e.g. vendors.kingsleyonoh.com
#   VPS_USER                 — deploy user (e.g. `deploy`)
#   VPS_SSH_KEY              — private SSH key, ed25519 preferred
#   VPS_DEPLOY_PATH          — absolute path to the compose dir, e.g. /opt/vpi
#   GHCR_PULL_TOKEN          — PAT scoped `read:packages`; the deploy user
#                              uses this to `docker login ghcr.io` before
#                              pulling the freshly-built image.

on:
  workflow_run:
    workflows: ["Build & Push to GHCR"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (default: latest)'
        required: false
        default: 'latest'

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Determine image tag
        id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          if [ -n "${INPUT_TAG}" ]; then
            echo "image_tag=${INPUT_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Roll deployment on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          IMAGE_TAG: ${{ steps.tag.outputs.image_tag }}
          IMAGE_REPO: ghcr.io/${{ github.repository }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
              "${VPS_USER}@${VPS_HOST}" \
              "cd ${VPS_DEPLOY_PATH} && \
               echo '${GHCR_PULL_TOKEN}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin && \
               export VPI_IMAGE='${IMAGE_REPO}:${IMAGE_TAG}' && \
               docker compose -f docker-compose.prod.yml pull && \
               docker compose -f docker-compose.prod.yml up -d --remove-orphans && \
               docker image prune -f --filter 'until=72h'"

      - name: Verify deployment health
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          # Poll /api/health/ready up to 24 times (4 minutes) before
          # giving up — the migrate container can take a moment on big
          # schema changes.
          for i in $(seq 1 24); do
            status=$(curl -s -o /dev/null -w '%{http_code}' "https://${VPS_HOST}/api/health/ready" || echo "000")
            if [ "${status}" = "200" ]; then
              echo "Deployment healthy after ${i} attempts"
              exit 0
            fi
            echo "Attempt ${i}: got status ${status}, retrying in 10s..."
            sleep 10
          done
          echo "Deployment did NOT report healthy within 4 minutes"
          exit 1
